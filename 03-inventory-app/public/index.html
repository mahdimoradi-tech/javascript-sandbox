<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warehouse Project</title>
    <link rel="stylesheet" href="./build/tailwind.css" />
    <script src="/src/js/app.js" type="module" defer></script>
  </head>
  <body>
    <div class="bg-slate-800 min-h-screen">
      <!-- app bar -->
      <div
        class="h-12 flex items-center justify-center gap-x-4 bg-slate-700 mb-6"
      >
        <h1 class="text-xl font-bold text-slate-300">
          Warehouse App using tailwind & JS
        </h1>
        <span
          class="flex items-center justify-center w-7 h-7 rounded-full bg-slate-500 border-2 border-slate-300 font-bold text-slate-300"
          id="warehouse-counter"
        ></span>
      </div>

      <!-- app content -->
      <div class="container max-w-screen-sm mx-auto">
        <!-- category form -->
        <section>
          <div class="mb-6 hidden" id="category-wrapper">
            <h2 class="text-xl text-slate-300 font-bold mb-2">
              Add New Category
            </h2>
            <form class="bg-slate-700 p-4 rounded-xl flex flex-col gap-y-4">
              <div>
                <label for="category-title" class="block mb-1 text-slate-400"
                  >Title</label
                >
                <input
                  type="text"
                  name="category-title"
                  id="category-title"
                  placeholder="Title..."
                  required
                  class="bg-transparent rounded-xl border border-slate-500 text-slate-400"
                />
              </div>
              <div>
                <label
                  for="category-description"
                  class="block mb-1 text-slate-400"
                  >Description</label
                >
                <textarea
                  type="text"
                  name="category-description"
                  id="category-description"
                  required
                  class="bg-transparent rounded-xl border border-slate-500 text-slate-400 w-full"
                ></textarea>
              </div>
              <div class="flex items-center justify-between gap-x-4">
                <button
                  class="flex-1 border border-slate-400 text-slate-400 rounded-xl py-2"
                  id="cancel-add-category"
                >
                  Cancel
                </button>
                <button
                  id="add-new-category"
                  class="flex-1 bg-slate-500 text-slate-200 rounded-xl py-2"
                >
                  Add New Category
                </button>
              </div>
            </form>
          </div>
          <button
            class="text-slate-600 mb-4 text-lg font-medium"
            id="toggle-add-category-form"
          >
            Add New Category?
          </button>
        </section>

        <!-- product form -->
        <div class="mb-6">
          <h2 class="text-xl text-slate-300 font-bold mb-2">Add New Product</h2>
          <form class="bg-slate-700 p-4 rounded-xl flex flex-col gap-y-4">
            <div>
              <label for="product-title" class="block mb-1 text-slate-400"
                >Product Title</label
              >
              <input
                type="text"
                name="product-title"
                id="product-title"
                class="bg-transparent rounded-xl border border-slate-500 text-slate-400"
              />
            </div>
            <div>
              <label for="quantity" class="block mb-1 text-slate-400"
                >Quantity</label
              >
              <input
                type="number"
                name="quantity"
                id="quantity"
                class="bg-transparent rounded-xl border border-slate-500 text-slate-400"
              />
            </div>
            <div>
              <label for="product-category" class="block mb-1 text-slate-400"
                >Category</label
              >
              <select
                name="product-category"
                id="product-category"
                class="bg-transparent rounded-xl border border-slate-500 text-slate-400 w-full"
              ></select>
            </div>
            <div class="flex items-center justify-between gap-x-4">
              <button
                id="add-new-product"
                class="flex-1 bg-slate-500 text-slate-200 rounded-xl py-2"
              >
                Add New Product
              </button>
            </div>
          </form>
        </div>

        <!-- product list -->
        <h2 class="text-xl text-slate-300 font-bold mb-2">Product List</h2>

        <!-- search -->
        <div class="flex items-center justify-between mb-6">
          <label for="search-input" class="text-slate-400 text-lg"
            >search</label
          >
          <input
            type="text"
            name="search-input"
            id="search-input"
            class="bg-transparent rounded-xl border border-slate-500 text-slate-400"
          />
        </div>

        <!-- sort -->
        <h2 class="text-xl text-slate-300 font-bold mb-2">sort</h2>
        <div class="flex items-center justify-between mb-6">

          <!-- sort by add time -->
          <div class="flex items-center gap-3 justify-center">
            <label for="sort-products" class="text-slate-400 text-lg">add time</label>
          <select
            name="sort-products"
            id="sort-products"
            class="bg-transparent text-slate-400 rounded-xl"
          >
            <option class="bg-slate-500 text-slate-300" value="">
              select a category
            </option>
            <option class="bg-slate-500 text-slate-300" selected value="newest">
              newest
            </option>
            <option class="bg-slate-500 text-slate-300" value="oldest">
              oldest
            </option>
          </select>
          </div>

          <!-- sort by category -->
          <div class="flex items-center gap-3 justify-center">
              <label for="sort-products" class="text-slate-400 text-lg">category</label>
          <select
            name="sort-products"
            id="sort-products-by-category"
            class="bg-transparent text-slate-400 rounded-xl"
          ></select>
          </div>
        </div>

        <div id="products-list"></div>

        <div class="h-6"></div>
      </div>
    </div>

    <!-- edit product modal -->
    <div
      class="hidden fixed top-0 left-0 backdrop-blur-sm min-h-screen w-full z-10 cursor-pointer"
      id="modal-back-drop"
    ></div>
    <div
      class="hidden fixed z-20 p-8 w-[70%] max-w-[50rem] bg-slate-800 shadow-[4px_2px_12px_rgba(0,0,0,0.35)] rounded-2xl top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
      id="modal-edit-form"
    >
      <!-- modal header -->
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-xl text-slate-300 font-bold mb-2">
          Edit Selected Product
        </h2>
        <button
          class="flex items-center justify-center w-8 h-8 bg-slate-500 text-slate-300 border-2 rounded-full font-bold shadow-[4px_2px_12px_rgba(0,0,0,0.85)] poiter"
          id="close-modal-btn"
        >
          &times
        </button>
      </div>

      <!-- modal edit form -->
      <form class="bg-slate-700 p-4 rounded-xl flex flex-col gap-y-4">
        <div>
          <label for="product-title" class="block mb-1 text-slate-400"
            >Product Title</label
          >
          <input
            type="text"
            name="product-title"
            id="edit-product-title"
            class="bg-transparent rounded-xl border border-slate-500 text-slate-400"
          />
        </div>
        <div>
          <label for="quantity" class="block mb-1 text-slate-400"
            >Quantity</label
          >
          <input
            type="number"
            name="quantity"
            id="edit-quantity"
            class="bg-transparent rounded-xl border border-slate-500 text-slate-400"
          />
        </div>
        <div>
          <label for="product-category" class="block mb-1 text-slate-400"
            >Category</label
          >
          <select
            name="product-category"
            id="edit-product-category"
            class="bg-transparent rounded-xl border border-slate-500 text-slate-400 w-full"
          ></select>
        </div>
        <div class="flex items-center justify-between gap-x-4">
          <button
            id="edit-selected-product"
            class="flex-1 bg-slate-500 text-slate-200 rounded-xl py-2"
          >
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
