<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Dictionary & Flashcards</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="app.js" defer></script>

        <section class="result-section" id="result-container">

            <button id="add-to-deck-btn">➕ Add to Flashcards</button>
          </div> -->

        <section class="deck-section">
          <h2>
            <span>📚 My Flashcards</span>
            <span id="deck-count"></span>
          </h2>

          <ul id="flashcard-list" class="flashcard-list">
