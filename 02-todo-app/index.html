<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/todo.css" />
    <script
      src="https://kit.fontawesome.com/45acf4f9f1.js"
      crossorigin="anonymous"
    ></script>
    <title>ToDoList App</title>
  </head>
  <body>
    <header class="header">
      <h1>ToDo list</h1>
    </header>
    <section class="container">
      <div class="form-container">
        <form class="todo-form">
          <input type="text" class="todo-input" />
          <button class="add-todo" type="submit">
            <i class="fa-solid fa-circle-plus"></i>
          </button>
        </form>
        <div class="select">
          <select class="filter-todos" name="todos">
            <option value="all">All</option>
            <option value="completed">Completed</option>
            <option value="uncompleted">Uncompleted</option>
          </select>
        </div>
      </div>
      <div class="todo-container">
        <ul class="todolist"></ul>
      </div>
    </section>
    <div class="backdrop hidden"></div>
    <div class="modal hidden">
      <header class="modal__header">
        <h2 class="modal__header--title">Edit Your Task</h2>
        <i class="fa-solid fa-xmark modal__close"></i>
      </header>
      <form class="modal__content">
        <input type="text" class="edit-input" />
        <button class="modal__close">Close</button>
        <button class="modal__save" type="submit">Save</button>
      </form>
    </div>

    <script src="./js/todo.js"></script>
  </body>
</html>
